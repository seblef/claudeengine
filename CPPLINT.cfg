# cpplint configuration for ClaudeEngine.
# Google C++ Style Guide, with suppressions for project conventions.

linelength=120

# Suppressed categories:
#   legal/copyright        - no copyright headers (project convention)
#   build/header_guard     - project uses #pragma once, not #ifndef guards
#   build/namespaces       - test files use `using namespace core` for conciseness
#   build/c++17            - project targets C++20; <filesystem> is standard
#   build/include_order    - third-party headers (loguru, GLFW) sit after project headers
#   build/include_what_you_use - false positives from template-heavy headers
#   whitespace/comma       - compact {x,y,z} notation is intentional in math code
#   whitespace/braces      - aggregate initialiser lists in test files
#   whitespace/parens      - intentional alignment padding in matrix constructors
filter=-legal/copyright,-build/header_guard,-build/namespaces,-build/c++17,-build/include_order,-build/include_what_you_use,-whitespace/comma,-whitespace/braces,-whitespace/parens
